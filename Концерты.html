<!DOCTYPE html>
<html lang="ru">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Официальный сайт поклонников Татьяны Куртуковой</title> 

    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/mkXzqXXs/Screenshot-2026-03-19-00-41-59-377-com-android-chrome-edit.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- Loader --- */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a0500; display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }
        .elegant-loader { width: 80px; height: 80px; position: relative; }
        .elegant-loader:before, .elegant-loader:after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; background: #d4af37; opacity: 0.6; animation: pulse-gold 2s infinite ease-in-out;
        }
        .elegant-loader:after { animation-delay: -1s; }
        @keyframes pulse-gold { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* --- Global Style --- */
        body {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("https://i.postimg.cc/QCTGpSC0/New-Project-59F2DA6.png");
            background-size: cover; background-attachment: fixed; background-position: center;
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; scroll-behavior: smooth;
        }

        /* --- Side Menu --- */
        .menu-icon {
            position: fixed; top: 20px; left: 20px; font-size: 24px; color: #d4af37;
            cursor: pointer; z-index: 1100; background: rgba(26, 5, 0, 0.8);
            padding: 10px 15px; border-radius: 8px; border: 1px solid #d4af37;
        }
        .side-menu {
            position: fixed; top: 0; left: -50%; width: 50%; height: 100%;
            background: rgba(26, 5, 0, 0.98); border-right: 2px solid #d4af37;
            z-index: 1200; transition: 0.5s; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .side-menu.active { left: 0; }
        .menu-links a {
            display: block; padding: 15px; text-decoration: none;
            font-size: 1.2rem; color: #d4af37; font-weight: bold; transition: 0.3s;
        }
        .menu-links a:hover { color: #ff4d4d; transform: scale(1.1); }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 36px; color: #d4af37; cursor: pointer; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1150; }
        .menu-overlay.active { display: block; }

        /* --- Main Content --- */
        .main-content { padding: 80px 20px; text-align: center; max-width: 1000px; margin: 0 auto; }
        .profile-img { width: 220px; height: 220px; border-radius: 50%; border: 4px solid #d4af37; object-fit: cover; margin-bottom: 20px; }
        h1 { color: #d4af37; font-size: 2.5rem; margin-bottom: 5px; }

        /* --- Concerts Section (بەشی کۆنسێرتەکان) --- */
        .concerts-container { margin: 50px 0; text-align: left; scroll-margin-top: 100px; }
        .concert-card { background: rgba(26, 5, 0, 0.9); border: 1px solid #d4af37; border-radius: 15px; margin-bottom: 15px; overflow: hidden; }
        .concert-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: rgba(212, 175, 55, 0.1); }
        .concert-header h3 { margin: 0; color: #d4af37; }
        .concert-body { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 20px; }
        .concert-card.active .concert-body { max-height: 1000px; padding: 20px; }
        .concert-img img { width: 100%; max-width: 300px; border-radius: 10px; border: 1px solid #d4af37; }
        .concert-info { flex: 1; min-width: 250px; }
        .ticket-btn { display: inline-block; margin-top: 15px; padding: 10px 25px; background: #d4af37; color: #1a0500; text-decoration: none; font-weight: bold; border-radius: 25px; }

        @media screen and (max-width: 768px) { .side-menu { width: 80%; left: -80%; } }
    </style>
</head>
<body>

    <div id="loader-wrapper"><div class="elegant-loader"></div></div>

    <div class="menu-icon" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div id="sideMenu" class="side-menu">
        <div class="close-btn" onclick="toggleMenu()">&times;</div>
        <div class="menu-links">
            <a href="index.html">Главная</a>
            <a href="#concerts" onclick="toggleMenu()">Концерты</a> 
            <a href="gallery.html">Галерея</a>
            <a href="news.html">Новости</a>
            <a href="videos.html">Видео</a>
            <a href="about.html">О нас</a>
        </div>
    </div>
    <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>

    <div class="main-content">
        <img src="https://i.postimg.cc/L5yBY6Tc/New-Project-833-E8598F3.png" class="profile-img">
        <h1>Татьяна Куртукова</h1>
        
        <div id="concerts" class="concerts-container">
            <h2 style="color: #d4af37; border-left: 5px solid #d4af37; padding-left: 15px;">Предстоящие Концерты</h2>
            
            <div class="concert-card">
                <div class="concert-header" onclick="this.parentElement.classList.toggle('active')">
                    <h3>Концерт в Москве — «Песни Победы»</h3>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="concert-body">
                    <div class="concert-img">
                        <img src="https://i.postimg.cc/MHJ2vSR4/New-Project-830-5E91960.png" alt="Concert">
                    </div>
                    <div class="concert-info">
                        <p><i class="fas fa-calendar-alt" style="color:#d4af37"></i> <strong>Дата:</strong> 4 Мая, 2026</p>
                        <p><i class="fas fa-map-marker-alt" style="color:#d4af37"></i> <strong>Место:</strong> Крокус Сити Холл</p>
                        <p>بۆ نووسینی زانیاری دەربارەی کۆنسێرتەکە لێرە تێکستەکە بنووسە.</p>
                        <a href="#" class="ticket-btn">Купить Билет</a>
                    </div>
                </div>
            </div>
            </div>
    </div>

    <script>
        // لۆدینگەکە دوای ٣ چرکە لادەچێت
        window.addEventListener("load", function() {
            setTimeout(() => {
                document.getElementById("loader-wrapper").style.opacity = "0";
                setTimeout(() => { document.getElementById("loader-wrapper").style.display = "none"; }, 800);
            }, 3000);
        });

        function toggleMenu() {
            document.getElementById("sideMenu").classList.toggle("active");
            document.getElementById("menuOverlay").classList.toggle("active");
        }
    </script>
</body>
</html>
