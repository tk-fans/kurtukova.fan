        #loader-wrapper {
    position: fixed;

}

.elegant-loader {
    width: 80px; height: 80px;
    position: relative;
}

.elegant-loader:before, .elegant-loader:after {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #d4af37;
    opacity: 0.6;
    animation: pulse-gold 2s infinite ease-in-out;
}

.elegant-loader:after { animation-delay: -1s; }

@keyframes pulse-gold {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(1.5); opacity: 0; }
}

/* ئەم کلاسە بۆ شاردنەوەی لۆدینگەکەیە */

        function renderNews(filteredData = newsData) {
            const container = document.getElementById("news-list-container");
            if(!container) return;
            container.innerHTML = "";
            const now = new Date();

            filteredData.forEach(news => {
                if (news.expireDate && now >= new Date(news.expireDate)) return;
                const card = document.createElement("div");
                card.className = "news-card";
                card.innerHTML = `
                    <div class="news-image"><img src="${news.image}" alt="${news.title}"></div>
                    <div class="news-content">
                        <div>
                            <h2>${news.title}</h2>
                            <div class="news-meta">
                                <span><i class="far fa-calendar-alt"></i> ${news.date}</span>
                                <span><i class="fas fa-map-marker-alt"></i> ${news.location}</span>
                            </div>
                            <p>${news.excerpt}</p>
                        </div>
                        <button class="read-more-btn" onclick="openArticle(${news.id})">Читать далее →</button>
                    </div>`;
                container.appendChild(card);
            });
        }

        function filterNews() {
            const searchTerm = document.getElementById("newsSearch").value.toLowerCase();
            const filtered = newsData.filter(news => 
                news.title.toLowerCase().includes(searchTerm) || 
                news.excerpt.toLowerCase().includes(searchTerm)
            );
            renderNews(filtered);
        }

    
    document.addEventListener("DOMContentLoaded", function() {
        var loader = document.getElementById("loader-wrapper");
        if (loader) {
            setTimeout(function() {
                loader.style.transition = "opacity 0.8s ease";
                loader.style.opacity = "0";
                setTimeout(function() {
                    loader.style.display = "none";
                }, 800);
            }, 3000); 
        }
    });


      
        function openArticle(id) {
            const article = newsData.find(n => n.id === id);
            if (!article) return;
            document.getElementById("news-list-container").style.display = "none";
            document.getElementById("search-area").style.display = "none";
            document.getElementById("art-img").src = article.image;
            document.getElementById("art-title").innerText = article.title;
            document.getElementById("art-meta").innerHTML = `<span><i class="far fa-calendar-alt"></i> ${article.date}</span> &nbsp;&nbsp; <span><i class="fas fa-map-marker-alt"></i> ${article.location}</span>`;
            document.getElementById("art-content").innerHTML = article.content;
            document.getElementById("article-view").style.display = "block";
            window.scrollTo(0, 0);
        }

        function closeArticle() {
            document.getElementById("article-view").style.display = "none";
            document.getElementById("news-list-container").style.display = "block";
            document.getElementById("search-area").style.display = "block";
        }

        function toggleMenu() {
            document.getElementById("sideMenu").classList.toggle("active");
            document.getElementById("menuOverlay").classList.toggle("active");
        }
    </script>
