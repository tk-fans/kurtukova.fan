        // دروستکردنی کارتەکانی هەواڵ

        function renderNews() {

            const container = document.getElementById("news-list-container");

            container.innerHTML = "";

            const now = new Date();



            newsData.forEach(news => {

                if (news.expireDate && now >= new Date(news.expireDate)) return; // شاردنەوەی هەواڵی بەسەرچوو



                const card = document.createElement("div");

                card.className = "news-card";

                card.innerHTML = `

                    <div class="news-image"><img src="${news.image}" alt="${news.title}"></div>

                    <div class="news-content">

                        <div>

                            <h2>${news.title}</h2>

                            <div class="news-meta">

                                <span><i class="far fa-calendar-alt"></i> ${news.date}</span>

                                <span><i class="fas fa-map-marker-alt"></i> ${news.location}</span>

                            </div>

                            <p>${news.excerpt}</p>

                        </div>

                        <button class="read-more-btn" onclick="openArticle(${news.id})">Читать далее →</button>

                    </div>

                `;

                container.appendChild(card);

            });

        }



        // کردنەوەی هەواڵی تەواو

        function openArticle(id) {

            const article = newsData.find(n => n.id === id);

            if (!article) return;



            document.getElementById("news-list-container").style.display = "none";

            document.getElementById("filters").style.display = "none";

            

            document.getElementById("art-img").src = article.image;

            document.getElementById("art-title").innerText = article.title;

            document.getElementById("art-meta").innerHTML = `<span><i class="far fa-calendar-alt"></i> ${article.date}</span> &nbsp;&nbsp; <span><i class="fas fa-map-marker-alt"></i> ${article.location}</span>`;

            document.getElementById("art-content").innerHTML = article.content;



            document.getElementById("article-view").style.display = "block";

            window.scrollTo(0, 0); // بردنەوەی شاشەکە بۆ سەرەوە

        }



        // گەڕانەوە بۆ لیستی هەواڵەکان

        function closeArticle() {

            document.getElementById("article-view").style.display = "none";

            document.getElementById("news-list-container").style.display = "block";

            document.getElementById("filters").style.display = "block";

            window.scrollTo(0, 0);

        }



        function toggleMenu() {

            document.getElementById("sideMenu").classList.toggle("active");

            document.getElementById("menuOverlay").classList.toggle("active");

        }



        function showCategory(category, btn) {

            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

            btn.classList.add('active');



            if (category === 'telegram') {

                document.getElementById('news-list-container').style.display = 'none';

                document.getElementById('article-view').style.display = 'none';

                document.getElementById('telegram-feed').style.display = 'block';

            } else {

                document.getElementById('news-list-container').style.display = 'block';

                document.getElementById('telegram-feed').style.display = 'none';

                document.getElementById('article-view').style.display = 'none';

            }

        }



        // جێبەجێکردنی کارەکان کاتێک سایتەکە دەکرێتەوە

        window.addEventListener("DOMContentLoaded", function() {
    // یەکسەر هەواڵەکان دروست بکە لەناو پاشبنەمادا
    renderNews();

    // دوای ٣ چرکە (٣٠٠٠ میلی چرکە) لۆدینگەکە لادە
    setTimeout(() => { 
        const loader = document.getElementById("loader-wrapper");
        if (loader) {
            loader.classList.add("loader-hidden");
            
            // بۆ دڵنیایی زیاتر دوای نیو چرکەی تر بە تەواوی لایببە
            setTimeout(() => {
                loader.style.display = "none";
            }, 600);
        }
    }, 3000); 
});
