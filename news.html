<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости — Татьяна Куртукова</title>
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/QdJ1DjCc/Screenshot-2026-03-19-00-41-59-377-com-android-chrome-edit.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a0500; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.6s ease;
        }
        .loader-circle { width: 60px; height: 60px; border: 5px solid rgba(212, 175, 55, 0.1); border-top: 5px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-hidden { opacity: 0; pointer-events: none; }

        body {
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url("https://i.postimg.cc/L50vY6Kf/New-Project-59F2DA6.png");
            background-size: cover; background-attachment: fixed; color: white; font-family: 'Segoe UI', sans-serif; margin: 0;
        }
        
        nav { background: rgba(26, 5, 0, 0.95); padding: 15px; text-align: center; border-bottom: 2px solid #d4af37; position: sticky; top: 0; z-index: 1000; }
        nav a { color: #d4af37; margin: 0 15px; text-decoration: none; font-weight: bold; }

        .main-content { padding: 40px 20px; max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #d4af37; font-size: 2.5rem; }

        .filter-container { text-align: center; margin-bottom: 30px; }
        .filter-btn { background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 10px 20px; border-radius: 25px; cursor: pointer; margin: 5px; font-weight: bold; }
        .filter-btn.active { background: #d4af37; color: #1a0500; }

        .telegram-feed { display: none; background: rgba(0, 0, 0, 0.6); padding: 20px; border-radius: 20px; border: 1px solid #24A1DE; }
        
        /* چوارچێوەی تایبەت بۆ سکڕۆڵکردنی پۆستەکان */
        .tg-timeline {
            width: 100%;
            height: 800px;
            overflow-y: auto;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
        }

        .news-card { background: rgba(0, 0, 0, 0.8); border: 1px solid #d4af37; border-radius: 15px; margin-bottom: 20px; overflow: hidden; display: flex; }
        .news-image { width: 300px; }
        .news-image img { width: 100%; height: 100%; object-fit: cover; }
        .news-content { padding: 20px; }

        @media (max-width: 768px) { .news-card { flex-direction: column; } .news-image { width: 100%; height: 200px; } }
    </style>
</head>
<body>

    <div id="loader-wrapper"><div class="loader-circle"></div></div>

    <nav>
        <a href="index.html">Главная</a>
        <a href="gallery.html">Галерея</a>
        <a href="news.html">Новости</a>
        <a href="videos.html">Видео</a>
    </nav>

    <div class="main-content">
        <h1>Новости</h1>

        <div class="filter-container">
            <button class="filter-btn active" onclick="showCategory('all', this)">Все новости</button>
            <button class="filter-btn" onclick="showCategory('telegram', this)"><i class="fab fa-telegram"></i> Telegram Feed</button>
        </div>

        <div id="all-news">
            <div class="news-card">
                <div class="news-image"><img src="https://i.postimg.cc/T1PBt5nX/1774338616.jpg"></div>
                <div class="news-content">
                    <h2 style="color: #d4af37;">Песни Победы 2026</h2>
                    <p>Концерт в Государственном Кремлёвском Дворце состоится 4 мая 2026 года.</p>
                </div>
            </div>
        </div>

        <div id="telegram-feed" class="telegram-feed">
            <h2 style="text-align: center; color: #24A1DE; margin-bottom: 20px;"><i class="fab fa-telegram"></i> Прямой эфир из Telegram</h2>
            
            <div class="tg-timeline">
                <script async src="https://telegram.org/js/telegram-widget.js?22" 
                        data-telegram-post="kurtukova_ts/1124" 
                        data-width="100%" 
                        data-color="D4AF37" 
                        data-dark="1"></script>
                
                <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="kurtukova_ts/1123" data-width="100%" data-color="D4AF37" data-dark="1"></script>
                <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="kurtukova_ts/1122" data-width="100%" data-color="D4AF37" data-dark="1"></script>
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <a href="https://t.me/kurtukova_ts" target="_blank" style="background: #24A1DE; color: white; padding: 12px 35px; border-radius: 30px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 15px rgba(36, 161, 222, 0.4);">Открыть канал</a>
            </div>
        </div>
    </div>

    <script>
        function showCategory(category, btn) {
            const allNews = document.getElementById('all-news');
            const telegramFeed = document.getElementById('telegram-feed');
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (category === 'telegram') {
                allNews.style.display = 'none';
                telegramFeed.style.display = 'block';
            } else {
                allNews.style.display = 'block';
                telegramFeed.style.display = 'none';
            }
        }

        window.addEventListener("load", function() {
            setTimeout(() => { document.getElementById("loader-wrapper").classList.add("loader-hidden"); }, 500);
        });
    </script>
</body>
</html>
