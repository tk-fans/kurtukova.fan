<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Помощник — Татьяна Куртукова</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("https://i.postimg.cc/L50vY6Kf/New-Project-59F2DA6.png");
            background-size: cover; background-attachment: fixed; background-position: center;
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px;
        }
        
        nav {
            text-align: center; margin-bottom: 20px; padding: 10px;
            background: rgba(0,0,0,0.5); border-radius: 10px;
        }
        nav a { color: white; text-decoration: none; margin: 0 10px; font-weight: bold; transition: 0.3s; }
        nav a:hover { color: #d4af37; }

        .chat-container { 
            max-width: 600px; margin: 0 auto; background: rgba(26, 5, 0, 0.95); 
            border: 2px solid #d4af37; border-radius: 20px; padding: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; height: 70vh;
        }

        #chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 10px; }
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }

        .message { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; font-size: 1.05rem; }
        .bot-msg { background: rgba(212, 175, 55, 0.15); border-left: 4px solid #d4af37; align-self: flex-start; color: #fff; }
        .user-msg { background: rgba(255, 255, 255, 0.1); border-right: 4px solid #aaa; align-self: flex-end; text-align: right; color: #ddd; }

        .input-area { display: flex; gap: 10px; margin-top: 20px; }
        .input-area input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #d4af37; background: #000; color: #fff; outline: none; }
        .input-area button { padding: 0 25px; background: #d4af37; color: #1a0500; border: none; border-radius: 12px; cursor: pointer; }

        /* شاردنەوەی ئایکۆنە خڕەکەی تیدۆ */
        #tidio-chat-iframe { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Главная</a>
        <a href="gallery.html">Галерея</a>
        <a href="news.html">Новости</a>
        <a href="videos.html">Видео</a> 
        <a href="ask.html" style="color: #FFD700; border: 1px solid #FFD700; padding: 5px 12px; border-radius: 20px;">
            <i class="fas fa-robot"></i> AI Bot
        </a>
    </nav>

    <div class="chat-container">
        <div style="text-align: center;">
            <i class="fas fa-robot" style="font-size: 40px; color: #d4af37; margin-bottom: 10px;"></i>
            <h1 style="color: #d4af37; margin: 0 0 10px 0; font-size: 1.6rem;">Tatyana AI Bot</h1>
        </div>

        <div id="chat-box">
            <div class="message bot-msg">Привет! 👋 Я слушаю тебя. / Hello! I'm listening. / سڵاو! گوێگرتم.</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Напишите сообщение...">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="//code.tidio.co/kxd4uklm8kp3mcqbg6ubzntmcmat1kme.js" async></script>

    <script>
        function sendMessage() {
            const inputField = document.getElementById("userInput");
            <script>
        function sendMessage() {
            const inputField = document.getElementById("userInput");
            const message = inputField.value.trim();
            const chatBox = document.getElementById("chat-box");

            if (message === "") return;

            // ١. پیشاندانی نامەی بەکارهێنەر لەناو سندوقەکەت
            chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // ٢. ناردنی نامەکە بۆ تیدۆ (پشکنین دەکات ئایا تیدۆ ئامادەیە)
            if (window.tidioChatApi) {
                window.tidioChatApi.send(message); // بەکارهێنانی .send باشترە
            } else {
                console.log("Tidio is loading...");
            }
        }

        // ٣. وەرگرتنی وەڵام لە تیدۆ و ناردنی بۆ ناو سندوقە چاتەکەمان
        window.tidioChatApiReady = function() {
            window.tidioChatApi.on("messageFromService", function(message) {
                const chatBox = document.getElementById("chat-box");
                // لێرە وەڵامەکەی تیدۆ وەردەگرین و دەیخەینە ناو دیزاینەکەی خۆمان
                chatBox.innerHTML += `<div class="message bot-msg">${message}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            });

            // بە زۆر شاردنەوەی ئایکۆنە خڕەکە ئەگەر دەرکەوت
            window.tidioChatApi.hide();
        };

        document.getElementById("userInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>

        });
    </script>
</body>
</html>
