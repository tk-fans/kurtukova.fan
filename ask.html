<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatyana AI Bot</title>
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/QdJ1DjCc/Screenshot-2026-03-19-00-41-59-377-com-android-chrome-edit.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("https://i.postimg.cc/L50vY6Kf/New-Project-59F2DA6.png");
            background-size: cover; background-attachment: fixed; background-position: center;
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px;
        }
        nav { text-align: center; margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.5); border-radius: 10px; }
        nav a { color: white; text-decoration: none; margin: 0 10px; font-weight: bold; }
        .chat-container { 
            max-width: 600px; margin: 0 auto; background: rgba(26, 5, 0, 0.95); 
            border: 2px solid #d4af37; border-radius: 20px; padding: 30px; height: 70vh; display: flex; flex-direction: column;
        }
        #chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .bot-msg { background: rgba(212, 175, 55, 0.2); border-left: 4px solid #d4af37; align-self: flex-start; }
        .user-msg { background: rgba(255, 255, 255, 0.1); border-right: 4px solid #aaa; align-self: flex-end; }
        .input-area { display: flex; gap: 10px; margin-top: 20px; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #d4af37; background: #000; color: #fff; outline: none; }
        button { padding: 0 25px; background: #d4af37; border: none; border-radius: 12px; cursor: pointer; color: #1a0500; }
        .typing { font-size: 12px; color: #d4af37; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Главная</a>
        <a href="gallery.html">Галерея</a>
        <a href="news.html">Новости</a>
        <a href="videos.html">Видео</a>
    </nav>

    <div class="chat-container">
        <div style="text-align: center; margin-bottom: 15px;">
            <i class="fas fa-robot" style="font-size: 40px; color: #d4af37;"></i>
            <h1 style="color: #d4af37; margin: 5px 0;">Tatyana AI</h1>
        </div>
        <div id="chat-box">
            <div class="message bot-msg">Привет! Я помощник Татьяны Куртуковой. О чем хочешь спросить?</div>
        </div>
        <div id="typing" class="typing">Tatyana AI печатает...</div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Напишите сообщение...">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const chatBox = document.getElementById("chat-box");
            const typingIndicator = document.getElementById("typing");
            const text = inputField.value.trim();

            if (!text) return;

            // ١. پیشاندانی نامەی بەکارهێنەر
            chatBox.innerHTML += `<div class="message user-msg">${text}</div>`;
            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // ٢. پیشاندانی نیشانەی نووسین
            typingIndicator.style.display = "block";

            try {
                // لێرەدا پەیوەندی بە API دەکەین (ئەمە نموونەیە، دەبێت API Key دابنێیت)
                // بۆ ئەوەی بە خۆڕایی بێت، دەتوانیت لە DuckDuckGo AI یان DuckDuckGo Chat بەکاری بهێنیت
                const response = await fetch("https://api.duckduckgo.com/?q=" + encodeURIComponent(text) + "&format=json");
                const data = await response.json();
                
                let reply = data.AbstractText || "Я пока учусь отвечать на сложные вопросы. Задайте другой вопрос о Татьяне!";
                
                // ٣. پیشاندانی وەڵامی AI
                chatBox.innerHTML += `<div class="message bot-msg">${reply}</div>`;
            } catch (error) {
                chatBox.innerHTML += `<div class="message bot-msg">Извините, произошла ошибка подключения.</div>`;
            }

            typingIndicator.style.display = "none";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById("userInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
