    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        body {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("https://i.postimg.cc/L50vY6Kf/New-Project-59F2DA6.png");
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        nav {
            background: rgba(26, 5, 0, 0.95);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #d4af37;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: #d4af37;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ff4d4d;
        }

        .main-content {
            padding: 60px 20px;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-size: 3rem;
            color: #d4af37;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #cccccc;
            margin-bottom: 50px;
        }

        /* ستایلی چوارچێوەی ڤیدیۆکان */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .video-card {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #d4af37;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .video-card:hover {
            transform: scale(1.02);
        }

        .video-card h3 {
            color: #d4af37;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        /* ئەمە وا دەکات ڤیدیۆکە لەسەر مۆبایل تێکنەچێت */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* قەبارەی سینەمایی 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            background: transparent;
            padding: 40px 20px;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
