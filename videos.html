    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- Loader Style --- */
        #loader-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a0500; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .elegant-loader {
            width: 80px; height: 80px;
            position: relative;
        }

        .elegant-loader:before, .elegant-loader:after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #d4af37;
            opacity: 0.6;
            animation: pulse-gold 2s infinite ease-in-out;
        }

        .elegant-loader:after { animation-delay: -1s; }

        @keyframes pulse-gold {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        body {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("https://i.postimg.cc/L50vY6Kf/New-Project-59F2DA6.png");
            background-size: cover; background-attachment: fixed; background-position: center;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0;
            cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym46.cur'), auto !important;
        }

        a, button, .filter-btn { cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym46.cur'), pointer !important; }

        /* --- Side Menu --- */
        .menu-icon {
            position: fixed; top: 20px; left: 20px;
            font-size: 24px; color: #d4af37; cursor: pointer;
            z-index: 1100; background: rgba(26, 5, 0, 0.8);
            padding: 10px 15px; border-radius: 8px; border: 1px solid #d4af37;
        }
        .side-menu {
            position: fixed; top: 0; left: -50%; width: 50%; height: 100%;
            background: rgba(26, 5, 0, 0.98); border-right: 2px solid #d4af37;
            z-index: 1200; transition: 0.5s; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .side-menu.active { left: 0; }
        .menu-links a { display: block; padding: 15px; text-decoration: none; font-size: 1.2rem; color: #d4af37; font-weight: bold; transition: 0.3s; }
        .menu-links a:hover, .menu-links a.active { color: #ff4d4d; transform: scale(1.1); }
        .close-btn-menu { position: absolute; top: 20px; right: 25px; font-size: 36px; color: #d4af37; cursor: pointer; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1150; }
        .menu-overlay.active { display: block; }

        /* --- Content --- */
        .main-content { padding: 80px 20px 60px 20px; text-align: center; max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 3rem; color: #d4af37; margin-bottom: 10px; }
        
        #video-count {
            color: #d4af37; font-weight: bold; margin-bottom: 30px; font-size: 1.1rem;
            background: rgba(212, 175, 55, 0.1); display: inline-block; padding: 5px 20px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .search-box {
            width: 100%; max-width: 400px; padding: 12px 25px; border-radius: 30px;
            border: 2px solid #d4af37; background: rgba(0, 0, 0, 0.6); color: white; outline: none; margin-bottom: 25px;
        }

        .filter-container { margin-bottom: 40px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .filter-btn {
            background: rgba(212, 175, 55, 0.05); border: 1px solid #d4af37; color: #d4af37;
            padding: 8px 20px; border-radius: 25px; font-weight: bold; transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover { background: #d4af37; color: #1a0500; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .video-card {
            background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 15px;
            padding: 15px; transition: 0.4s; backdrop-filter: blur(5px);
        }
        .video-card:hover { transform: translateY(-8px); border-color: #d4af37; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
        .video-card.hidden { display: none; }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        h3 { color: #d4af37; margin: 15px 0; font-size: 1rem; height: 40px; overflow: hidden; }

        /* --- Fullscreen Logo Text --- */
        .video-overlay-text {
            position: absolute;
            top: 25px; right: 25px;
            color: rgba(212, 175, 55, 0.8); 
            font-size: 22px; font-weight: bold; text-align: center;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
            pointer-events: none; z-index: 2147483647;
            display: none; 
        }

        .video-container:fullscreen .video-overlay-text,
        .video-container:-webkit-full-screen .video-overlay-text { display: block; }

        /* --- Fullscreen Button --- */
        .custom-fs-btn {
            position: absolute; top: 10px; left: 10px;
            background: rgba(26, 5, 0, 0.85); border: 1px solid #d4af37;
            color: #d4af37; padding: 8px 15px; border-radius: 8px;
            z-index: 10; font-size: 13px; font-weight: bold;
            opacity: 0; transition: 0.3s;
        }

        .video-container:hover .custom-fs-btn { opacity: 1; }

        .back-to-top {
            position: fixed; bottom: 30px; right: 30px; background: rgba(26, 5, 0, 0.8);
            color: #d4af37; border: 1px solid #d4af37; width: 45px; height: 45px;
            border-radius: 50%; display: none; z-index: 1500;
        }

        footer { padding: 40px; text-align: center; border-top: 1px solid #d4af37; background: rgba(0,0,0,0.8); margin-top: 50px;}
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="elegant-loader"></div>
    </div>

    <div class="menu-icon" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>

    <div id="sideMenu" class="side-menu">
        <div class="close-btn-menu" onclick="toggleMenu()">&times;</div>
        <div class="menu-links">
            <a href="index.html">Главная</a>
            <a href="gallery.html">Галерея</a>
            <a href="news.html">Новости</a>
            <a href="videos.html" class="active">Видео</a> 
            <a href="quiz.html">Квиз</a>
            <a href="about.html">О нас</a>
            <hr style="border: 0.5px dashed #d4af37; width: 80%; margin: 20px auto;">
            <a href="ask.html" style="color: #FFD700;"><i class="fas fa-robot"></i> AI Bot</a>
        </div>
    </div>
    <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>

    <div class="main-content">
        <h1>Видео</h1> 
        <p id="video-count">Всего видео: 0</p>

        <input type="text" id="videoSearch" class="search-box" placeholder="Поиск видео..." onkeyup="applyFilters()">

        <div class="filter-container">
            <button class="filter-btn active" id="btn-all" onclick="filterCategory('all')">Все</button>
            <button class="filter-btn" id="btn-songs" onclick="filterCategory('songs')">Песни</button>
            <button class="filter-btn" id="btn-live" onclick="filterCategory('live')">Концерты</button>
            <button class="filter-btn" id="btn-podcasts" onclick="filterCategory('podcasts')">Интервью</button>
        </div>

        <div class="video-grid" id="mainGrid">
            <div class="video-card songs"><h3>Матушка</h3><div class="video-container"><iframe src="https://www.youtube.com/embed/mYn1-gYwDpM" loading="lazy"></iframe></div></div>
            <div class="video-card songs"><h3>Ромашка Василёк</h3><div class="video-container"><iframe src="https://www.youtube.com/embed/8mtxEbvzkHs" loading="lazy"></iframe></div></div>
            <div class="video-card songs"><h3>Одного</h3><div class="video-container"><iframe src="https://www.youtube.com/embed/BiF6j9UzRkk" loading="lazy"></iframe></div></div>
            <div class="video-card live"><h3>Русская мода (Live)</h3><div class="video-container"><iframe src="https://www.youtube.com/embed/g2oPInwsqAs" loading="lazy"></iframe></div></div>
            <div class="video-card podcasts"><h3>Интервью с Алёной</h3><div class="video-container"><iframe src="https://www.youtube.com/embed/dbaewz_bWN4" loading="lazy"></iframe></div></div>
            <div class="video-card live"><h3>Русская дорога</h3><div class="video-container"><iframe src="https://vkvideo.ru/video_ext.php?oid=-207836019&id=456245144&hd=2"></iframe></div></div>
            </div> 
    </div>

    <button id="backToTop" class="back-to-top"><i class="fas fa-chevron-up"></i></button>

    <footer>
        <div class="social-icons" style="margin-bottom: 20px;">
            <a href="https://www.instagram.com/ts_makeeva_fan" target="_blank" style="color: #d4af37; font-size: 30px; margin: 0 15px;"><i class="fab fa-instagram"></i></a>
            <a href="https://youtube.com/@ts_makeeva_fan" target="_blank" style="color: #d4af37; font-size: 30px; margin: 0 15px;"><i class="fab fa-youtube"></i></a>
        </div>
        <p style="color: #d4af37;">&copy; 2026 Tatyana Kurtukova Fan Community</p>
    </footer>

    <script>
        // --- 1. لۆدینگەکە بە زۆرەملێ لادەبات ---
        function hideLoader() {
            const loader = document.getElementById("loader-wrapper");
            if (loader) {
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 800);
            }
        }
        window.addEventListener('load', hideLoader);
        setTimeout(hideLoader, 3000); // ئەگەر زۆری خایاند دوای ٣ چرکە لایدەبات

        // --- 2. مینیو و فلتەرەکان ---
        function toggleMenu() {
            document.getElementById("sideMenu").classList.toggle("active");
            document.getElementById("menuOverlay").classList.toggle("active");
        }

        let currentCategory = 'all';
        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + cat).classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('videoSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.video-card');
            cards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                const categoryMatch = (currentCategory === 'all' || card.classList.contains(currentCategory));
                const searchMatch = title.includes(search);
                card.classList.toggle('hidden', !(categoryMatch && searchMatch));
            });
            updateVideoCount();
        }

        function updateVideoCount() {
            const visible = document.querySelectorAll('.video-card:not(.hidden)').length;
            document.getElementById('video-count').innerText = "Всего видео: " + visible;
        }

        // --- 3. سیستەمی لۆگۆ و فول سکرین (لێرە کێشەکەت هەبوو) ---
        document.addEventListener("DOMContentLoaded", () => {
            updateVideoCount();
            const videoContainers = document.querySelectorAll('.video-container');
            
            videoContainers.forEach(container => {
                // دروستکردنی لۆگۆ
                const logoText = document.createElement('div');
                logoText.className = 'video-overlay-text';
                logoText.innerHTML = 'Поклонники<br>Татьяны Куртуковой';
                container.appendChild(logoText);
                
                // دروستکردنی دوگمەی فول سکرین
                const fsBtn = document.createElement('button');
                fsBtn.className = 'custom-fs-btn';
                fsBtn.innerHTML = '<i class="fas fa-expand"></i> Полный экран';
                
                fsBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (!document.fullscreenElement) {
                        if (container.requestFullscreen) container.requestFullscreen();
                        else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
                    } else {
                        if (document.exitFullscreen) document.exitFullscreen();
                    }
                };
                container.appendChild(fsBtn);
            });
        });

        // گەڕانەوە بۆ سەرەوە
        const btt = document.getElementById("backToTop");
        window.onscroll = () => btt.style.display = (window.scrollY > 400) ? "block" : "none";
        btt.onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});
    </script>
</body>
