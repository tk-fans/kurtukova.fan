        /* --- لۆجیکی لۆدینگ --- */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a0500; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.6s ease;
        }
        .loader-circle {
            width: 60px; height: 60px; border: 5px solid rgba(212, 175, 55, 0.1);
            border-top: 5px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite;
        }
        .loader-text {
            margin-top: 20px; color: #d4af37; font-family: 'Segoe UI', sans-serif;
            letter-spacing: 3px; font-size: 14px; font-weight: bold; animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .loader-hidden { opacity: 0; pointer-events: none; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes floatTitle { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }

        html { scroll-behavior: smooth; }

        body {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("https://i.postimg.cc/L50vY6Kf/New-Project-59F2DA6.png");
            background-size: cover; background-attachment: fixed; background-position: center;
            color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0;
            cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym46.cur'), auto !important;
        }

        a, button, .image-card { cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym46.cur'), pointer !important; }

        /* --- Side Menu Styling --- */
        .menu-icon {
            position: fixed; top: 20px; left: 20px;
            font-size: 24px; color: #d4af37; cursor: pointer;
            z-index: 1100; background: rgba(26, 5, 0, 0.8);
            padding: 10px 15px; border-radius: 8px; border: 1px solid #d4af37;
        }

        .side-menu {
            position: fixed; top: 0; left: -50%; width: 50%; height: 100%;
            background: rgba(26, 5, 0, 0.98); border-right: 2px solid #d4af37;
            z-index: 1200; transition: 0.5s; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .side-menu.active { left: 0; }

        .menu-links { width: 100%; text-align: center; }
        .menu-links a {
            display: block; padding: 15px; text-decoration: none;
            font-size: 1.2rem; color: #d4af37; font-weight: bold;
            transition: 0.3s;
        }

        .menu-links a:hover, .menu-links a.active { color: #ff4d4d; transform: scale(1.1); }

        .close-btn-menu {
            position: absolute; top: 20px; right: 25px;
            font-size: 36px; color: #d4af37; cursor: pointer;
        }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 1150;
        }
        .menu-overlay.active { display: block; }

        @media screen and (max-width: 768px) {
            .side-menu { width: 80%; left: -80%; }
        }

        /* --- Gallery Styles --- */
        .gallery-container { padding: 80px 20px; text-align: center; animation: fadeInUp 1s ease-out; }
        h1 { color: #d4af37; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); margin-bottom: 10px; font-size: 3rem; animation: floatTitle 3s ease-in-out infinite; }
        #photo-count { color: #d4af37; font-weight: bold; margin-bottom: 30px; font-size: 1.2rem; background: rgba(212, 175, 55, 0.1); display: inline-block; padding: 5px 20px; border-radius: 20px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .image-card { border: 2px solid #d4af37; border-radius: 12px; overflow: hidden; background: rgba(0, 0, 0, 0.5); transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .image-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4); border-color: #ff4d4d; }
        .image-card img { width: 100%; height: 400px; object-fit: cover; display: block; transition: filter 0.3s ease; }
        .image-card:hover img { filter: brightness(1.1); }

        .back-to-top { position: fixed; bottom: 30px; right: 30px; background: rgba(26, 5, 0, 0.8); color: #d4af37; border: 2px solid #d4af37; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; display: none; z-index: 1500; transition: 0.3s; }
        .back-to-top:hover { background: #d4af37; color: #1a0500; transform: scale(1.1); }

        /* Lightbox */

    <script> 
        window.addEventListener("load", function() {
            const loader = document.getElementById("loader-wrapper");
            setTimeout(() => { loader.classList.add("loader-hidden"); }, 800); 
        });

        function toggleMenu() {
            const menu = document.getElementById("sideMenu");
            const overlay = document.getElementById("menuOverlay");
            menu.classList.toggle("active");
            overlay.classList.toggle("active");
        }

        const backToTopBtn = document.getElementById("backToTop");
        window.onscroll = function() {
            if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) {
                backToTopBtn.style.display = "block";
            } else {
                backToTopBtn.style.display = "none";
            }
        };

        backToTopBtn.onclick = function() { window.scrollTo({top: 0, behavior: 'smooth'}); };
        
        let currentImgIndex = 0;
        const images = [];

        document.addEventListener("DOMContentLoaded", function() {
            const imgElements = document.querySelectorAll('.image-card img');
            imgElements.forEach((img) => { images.push(img.src); });
            const totalPhotos = images.length;
            const countElement = document.getElementById('photo-count');
            if (countElement) { countElement.innerText = "Всего фото: " + totalPhotos; }
        });

        function openLightbox(index) {
            currentImgIndex = index;
            document.getElementById("lightbox").style.display = "flex";
            document.getElementById("lightbox-img").src = images[currentImgIndex];
            document.body.style.overflow = "hidden";
        }

        function closeLightbox() {
            document.getElementById("lightbox").style.display = "none";
            document.body.style.overflow = "auto";
        }

        function changeImage(step) {
            currentImgIndex += step;
            if (currentImgIndex >= images.length) currentImgIndex = 0;
            if (currentImgIndex < 0) currentImgIndex = images.length - 1;
            document.getElementById("lightbox-img").src = images[currentImgIndex];
        }

        window.onclick = function(event) { if (event.target == document.getElementById("lightbox")) { closeLightbox(); } }

        document.addEventListener('keydown', function(e) {
            if (document.getElementById("lightbox").style.display === "flex") {
                if (e.key === "Escape") closeLightbox();
                if (e.key === "ArrowRight") changeImage(1);
                if (e.key === "ArrowLeft") changeImage(-1);
            }
        });
    </script>
</body>
</html>
