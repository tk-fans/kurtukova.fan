        #photo-count {

            font-size: 1.2rem;
            background: rgba(212, 175, 55, 0.1);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .image-card {
            border: 2px solid #d4af37;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .image-card:hover {
            transform: scale(1.03);
        }

        .image-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
        }

        /* Back to Top Button Style */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(26, 5, 0, 0.8);
            color: #d4af37;
            border: 2px solid #d4af37;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: none;
            z-index: 1500;
            transition: 0.3s;
        }

        .back-to-top:hover {
            background: #d4af37;
            color: #1a0500;
            transform: scale(1.1);
        }

        /* Lightbox Styles */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 85vh;
            border: 3px solid #d4af37;
            border-radius: 10px;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #d4af37;
            font-size: 50px;
            cursor: pointer;
        }

        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #d4af37;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            padding: 20px;
            text-decoration: none;
        }

        .prev { left: 20px; }
        .next { right: 20px; }

        footer {
            padding: 40px;
            text-align: center;
        }
    </style>

    <script> 
        // JavaScript بۆ دوگمەی گەڕانەوە بۆ سەرەوە
        const backToTopBtn = document.getElementById("backToTop");

        window.onscroll = function() {
            if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) {
                backToTopBtn.style.display = "block";
            } else {
                backToTopBtn.style.display = "none";
            }
        };

        backToTopBtn.onclick = function() {
            window.scrollTo({top: 0, behavior: 'smooth'});
        };
        
        // JavaScript بۆ گەلەری و لایتبۆکس
        let currentImgIndex = 0;
        const images = [];

        document.addEventListener("DOMContentLoaded", function() {
            const imgElements = document.querySelectorAll('.image-card img');
            imgElements.forEach((img) => {
                images.push(img.src);
            });

            const totalPhotos = images.length;
            const countElement = document.getElementById('photo-count');
            if (countElement) {
                countElement.innerText = "Всего фото: " + totalPhotos;
            }
        });

        function openLightbox(index) {
            currentImgIndex = index;
            document.getElementById("lightbox").style.display = "flex";
            document.getElementById("lightbox-img").src = images[currentImgIndex];
            document.body.style.overflow = "hidden";
        }

        function closeLightbox() {
            document.getElementById("lightbox").style.display = "none";
            document.body.style.overflow = "auto";
        }

        function changeImage(step) {
            currentImgIndex += step;
            if (currentImgIndex >= images.length) currentImgIndex = 0;
            if (currentImgIndex < 0) currentImgIndex = images.length - 1;
            document.getElementById("lightbox-img").src = images[currentImgIndex];
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById("lightbox")) {
                closeLightbox();
            }
        }

        document.addEventListener('keydown', function(e) {
            if (document.getElementById("lightbox").style.display === "flex") {
                if (e.key === "Escape") closeLightbox();
                if (e.key === "ArrowRight") changeImage(1);
                if (e.key === "ArrowLeft") changeImage(-1);
            }
        });
    </script>
